# observability/prometheus/prometheus.yml
# k6 pushes metrics via remote-write (--web.enable-remote-write-receiver), so no
# scrape target for k6 is needed. Prometheus scrapes only itself here.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
