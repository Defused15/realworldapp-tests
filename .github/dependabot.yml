# .github/dependabot.yml
# Keep dependencies and CI actions up to date (SCA hygiene). Weekly, grouped to
# reduce noise.

version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns: ['*']
    labels: ['dependencies']

  - package-ecosystem: github-actions
    directory: '/'
    schedule: {interval: weekly}
    labels: ['ci', 'dependencies']
