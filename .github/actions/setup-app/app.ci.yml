# app.ci.yml — compose used ONLY by CI (and local smoke) to boot the app under
# test from the published GHCR image. Black-box: the app repo is never checked
# out; we pull an opaque image (REGLA #1). Mirrors docker-compose.test.yml from
# the app repo (NODE_ENV=test, isolated rwa_test DB, two servers: web:3000 +
# api:3001), but with the source BAKED INTO the image (target `ci`) instead of
# volume-mounted, so it runs anywhere without the app source.
#
# APP_IMAGE is parametrized so CI can pin a tag via `vars.APP_IMAGE`.
# Default points at the locally-built / pushed CI image.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rwa_test
    ports:
      # host 5433 → the db-integrity gate connects here via pg.Pool
      # (tests/helpers/db-helpers.ts defaults to localhost:5433).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rwa_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${APP_IMAGE:-ghcr.io/defused15/rwa-app:ci}
    command: sh -c "yarn prisma migrate deploy && yarn db:seed:postgres && yarn start:api"
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rwa_test
      PORT: 3000
      VITE_BACKEND_PORT: 3001
      PAGINATION_PAGE_SIZE: 10
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${APP_IMAGE:-ghcr.io/defused15/rwa-app:ci}
    command: yarn start:react --host 0.0.0.0
    environment:
      NODE_ENV: test
      PORT: 3000
      VITE_BACKEND_PORT: 3001
    ports:
      - "3000:3000"
    depends_on:
      - api
