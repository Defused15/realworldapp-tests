# .github/actions/setup-app/action.yml
# Composite action shared by every app-dependent gate: installs the test-runner
# deps, boots the app under test from the published GHCR image, waits for it,
# and seeds the DB. Single place where app startup lives.
#
# Black-box (REGLA #1): CI pulls an opaque image built+published by the app repo
# (Defused15/cypress-realworld-app → build-push.yml). The app source is never
# checked out here. The image runs as TWO servers — web:3000 + api:3001 — plus a
# postgres service, all wired by app.ci.yml in this directory.
#
# Requires the env var APP_IMAGE (set by the caller from vars.APP_IMAGE), e.g.
#   ghcr.io/defused15/rwa-app:latest

name: setup-app
description: Boot the app under test (GHCR image) + postgres, then seed the DB.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright browsers
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Boot the app under test (web:3000 + api:3001 + postgres)
      shell: bash
      run: |
        docker compose -f "$GITHUB_ACTION_PATH/app.ci.yml" pull
        docker compose -f "$GITHUB_ACTION_PATH/app.ci.yml" up -d

    - name: Wait for the API and UI to be ready
      shell: bash
      run: |
        wait_for() {
          local name="$1" url="$2"
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null "$url"; then echo "$name is up"; return 0; fi
            sleep 3
          done
          echo "::error::$name did not become ready: $url"
          docker compose -f "$GITHUB_ACTION_PATH/app.ci.yml" logs --tail=80
          return 1
        }
        wait_for "API" "${API_URL:-http://localhost:3001}"
        wait_for "UI"  "${BASE_URL:-http://localhost:3000}"

    - name: Seed the database
      shell: bash
      run: npm run db:seed
