name: Pipeline (gated)

# Sequential, fail-fast gate pipeline: cheap → expensive. Jobs are chained with
# `needs:`, so a failing gate stops the ones after it.
#
#   quality
#    ├─ security-sca           (no app needed — runs now, green)
#    └─ contract → api → db → ui → performance → zap     (need the app)
#                                                  └─ report (always)
#
# The app-dependent gates are guarded by `vars.APP_IMAGE`: when unset they are
# skipped and CI stays green on `quality` + `security-sca`. Set it to the GHCR
# image (e.g. ghcr.io/defused15/rwa-app:latest, published by the app repo's
# build-push.yml) to activate them. App + postgres are booted as one compose
# stack in .github/actions/setup-app/ (action.yml + app.ci.yml).

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
  BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
  TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME || 'Heath93' }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 's3cret' }}

jobs:
  # ── Always runs (no app) ───────────────────────────────────────────────────
  quality:
    name: Quality (lint · types · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: '20', cache: npm}
      - run: npm ci
      - run: npm run compile # tsc --noEmit equivalent (build)
      - run: npm run lint
      - run: npm run test:unit:coverage # unit tests + coverage gate (no app needed)
      - name: Coverage summary → job summary
        if: always()
        run: node tests/scripts/coverage-summary.mjs
      - uses: actions/upload-artifact@v7
        if: always()
        with: {name: unit-coverage, path: reports/coverage, retention-days: 30}

  security-sca:
    name: Security · SCA + secrets (no app)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0} # gitleaks needs full history
      # Run the gitleaks CLI via Docker instead of gitleaks/gitleaks-action@v2:
      # the action makes an unauthenticated GitHub API call to check the account
      # type, hits the API rate limit, and then demands a paid GITLEAKS_LICENSE.
      # The CLI has no such gate.
      - name: Gitleaks (secret scan)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml \
            --redact --verbose --no-banner
      - name: Trivy (dependencies + misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: security/trivy/trivy.yaml

  # ── App-dependent gates (skipped until vars.APP_IMAGE is set) ───────────────
  contract:
    name: Gate 1 · API contract
    needs: quality
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    # postgres is booted by setup-app via app.ci.yml (app image + DB are one
    # compose stack), not as a GitHub Actions service.
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      - run: npm run test:contract

  api:
    name: Gate 2 · API tests
    needs: contract
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      # PR → @smoke (fast); push → full api project. @quarantine excluded from
      # the gate (runs non-gating in the `quarantine` job below).
      - run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --project=api --grep @smoke --grep-invert @quarantine
          else
            npx playwright test --project=api --grep-invert @quarantine
          fi
      - run: npm run flaky:summary
        if: always()

  db:
    name: Gate 3 · DB integrity
    needs: api
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    env:
      APP_IMAGE: '${{ vars.APP_IMAGE }}'
      DB_HOST: localhost
      DB_PORT: '5433' # app.ci.yml publishes postgres on host 5433
      DB_NAME: rwa_test # the CI compose runs the app against the rwa_test DB
      DB_USER: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      - run: npm run test:db

  ui:
    name: Gate 4 · UI tests (shard ${{ matrix.shard }}/2)
    needs: db
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    # Sharding: split the UI tests across parallel runners for faster feedback.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      # PR → @smoke; push → smoke + regression + security. --shard splits the run.
      # @quarantine is excluded so known-flaky tests can't break the gate (they
      # still run, non-gating, in the `quarantine` job below).
      - run: |
          GREP='@smoke'
          [ "${{ github.event_name }}" != "pull_request" ] && GREP='@smoke|@regression|@security'
          npx playwright test --project=ui --grep "$GREP" --grep-invert @quarantine --shard=${{ matrix.shard }}/2
      # Flaky analytics: surface tests that only passed on retry (informative).
      - run: npm run flaky:summary
        if: always()
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-${{ matrix.shard }} # unique per shard
          path: allure-results/
          retention-days: 30

  performance:
    name: Gate 5 · Performance (k6)
    needs: ui
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      - uses: grafana/setup-k6-action@v1
      # All feature scenarios at the smoke profile; thresholds (SLOs) in
      # lib/thresholds.js are the gate — a breach fails the build.
      - run: npm run perf:all:smoke

  zap:
    name: Gate 6 · Security DAST (ZAP)
    needs: ui
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      # Run zap-baseline.py directly (same as `npm run security:zap`) instead of
      # zaproxy/action-baseline: that action's bundled artifact upload uses the
      # retired v3 artifact API ("artifact name zap_scan is not valid") and its
      # issue-filing step needs extra perms. Docker run gives us full control and
      # we publish the report ourselves with upload-artifact@v4.
      - name: ZAP baseline scan
        run: |
          mkdir -p zap-out && cp security/zap/rules.tsv zap-out/ && chmod -R 777 zap-out
          docker run --rm --network host -v "$PWD/zap-out:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "${BASE_URL}" -c rules.tsv \
            -r report.html -J report.json -w report.md -I
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-report
          path: zap-out/report.*
          retention-days: 30

  # ── API property/fuzz testing (non-gating) ─────────────────────────────────
  # Schemathesis fuzzes every operation in docs/api/openapi.yaml against the live
  # app (not_a_server_error: no 5xx). It is NON-GATING: the app under test has
  # known unhandled-500 defects (docs/bug-reports/api-fuzz-bugs.md, tracked as
  # `app-bug` issues) that we don't patch, so a finding must not block the build.
  # It still runs for visibility and uploads the HTML coverage report.
  schemathesis:
    name: API fuzz (Schemathesis · non-gating)
    needs: api
    if: ${{ vars.APP_IMAGE != '' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      - name: Run Schemathesis
        continue-on-error: true
        run: npm run test:schemathesis
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: schemathesis-report
          path: schemathesis-out/schema-coverage.html
          retention-days: 30
          if-no-files-found: ignore

  # ── Flaky quarantine (non-gating) ──────────────────────────────────────────
  # Known-flaky tests tagged @quarantine are excluded from the gates above so
  # they can't break the build. They still run here for visibility — this job
  # never blocks the pipeline (continue-on-error) and is not in `report`'s needs.
  # Push/nightly only; PRs stay fast.
  quarantine:
    name: Flaky quarantine (non-gating)
    needs: db
    if: ${{ vars.APP_IMAGE != '' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env: {APP_IMAGE: '${{ vars.APP_IMAGE }}'}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-app
      - run: npm run test:quarantine
        continue-on-error: true
      - run: npm run flaky:summary
        if: always()

  # ── Reporting ──────────────────────────────────────────────────────────────
  report:
    name: Allure report
    needs: [ui, performance, zap]
    if: ${{ always() && vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    # Pages deploy needs these scopes; the github-pages environment exposes the
    # published URL. PRs only build the artifact (no deploy) to avoid clobbering
    # the published site.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: '20', cache: npm}
      - run: npm ci
      # Allure CLI needs a JRE; the bundled openjdk:8-jre-alpine image that
      # simple-elf/allure-report-action@v1.9 used was pulled from Docker Hub,
      # so we generate the report with the local CLI instead.
      - uses: actions/setup-java@v5
        with: {distribution: temurin, java-version: '17'}
      - uses: actions/download-artifact@v8
        with:
          pattern: allure-results-* # merge results from every UI shard
          path: allure-results
          merge-multiple: true
      - run: npx allure generate allure-results --clean -o allure-report
      # Fold the unit-coverage HTML report into the published site (served at
      # /coverage alongside the Allure report at the root).
      - uses: actions/download-artifact@v8
        with: {name: unit-coverage, path: allure-report/coverage}
        continue-on-error: true # coverage may be absent on partial runs
      - name: Report links → job summary
        if: always()
        run: |
          {
            echo "### 📊 Test report (push to \`${GITHUB_REF_NAME}\`)"
            echo ""
            echo "- **Allure report:** https://defused15.github.io/realworldapp-tests/"
            echo "- **Unit coverage:** https://defused15.github.io/realworldapp-tests/coverage/"
            echo "- Schemathesis fuzz + per-shard flaky summaries: see the job artifacts above."
          } >> "$GITHUB_STEP_SUMMARY"
      # Always keep the report as a downloadable artifact (covers PRs too).
      - uses: actions/upload-artifact@v7
        with: {name: allure-report, path: allure-report}
      # Publish to GitHub Pages on push only → stable URL for the latest report.
      - uses: actions/upload-pages-artifact@v5
        if: ${{ github.event_name != 'pull_request' }}
        with: {path: allure-report}
      - id: deployment
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/deploy-pages@v5
