name: Release

# Runs semantic-release AFTER the gated pipeline succeeds on master, so a release
# is only ever cut from a fully-green build. Version, CHANGELOG and the GitHub
# Release are derived automatically from Conventional Commits.
on:
  workflow_run:
    workflows: ['Pipeline (gated)']
    types: [completed]

permissions:
  contents: write # tags, CHANGELOG commit, GitHub Release
  issues: write # release comments on closed issues
  pull-requests: write # release comments on merged PRs

jobs:
  release:
    name: semantic-release
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for commit analysis
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false # semantic-release authenticates via GITHUB_TOKEN
      - uses: actions/setup-node@v6
        with: {node-version: '24', cache: npm} # semantic-release needs Node >=24.10 (or ^22.14)
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
