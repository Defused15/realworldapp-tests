name: Performance Tests

on:
  schedule:
    - cron: '0 5 * * *' # Nightly at 5am
  workflow_dispatch: # Allow manual trigger

jobs:
  performance-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run performance tests
        run: npx playwright test --grep @performance --project=api --reporter=json,list
        continue-on-error: true
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-report
          path: playwright-report/
          retention-days: 30
      - name: Check performance regressions
        run: |
          if [ -f ./playwright-report/report.json ]; then
            FAILED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$FAILED" -gt "0" ]; then
              echo "❌ $FAILED performance test(s) failed — SLA thresholds exceeded"
              exit 1
            fi
            echo "✅ All endpoints within SLA"
          fi
