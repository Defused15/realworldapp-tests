name: Security Tests

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 3am
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  security-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run security tests
        run: npx playwright test --grep @security --reporter=json,list
        continue-on-error: true
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-report
          path: playwright-report/
          retention-days: 90
      - name: Check security findings
        run: |
          if [ -f ./playwright-report/report.json ]; then
            FAILED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$FAILED" -gt "0" ]; then
              echo "🚨 $FAILED security test(s) failed"
              exit 1
            fi
            echo "✅ All security checks passed"
          fi
