name: UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * *' # Nightly at 3am (full run including @visual)

jobs:
  ui-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # PR → @smoke only (~3 min fast feedback)
      - name: Run UI tests (PR — @smoke)
        if: github.event_name == 'pull_request'
        run: npx playwright test --project=ui --grep @smoke --reporter=json,list
        continue-on-error: true
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # push to main → smoke + regression + security (skip @visual — needs snapshot baseline)
      - name: Run UI tests (push to main — @smoke + @regression + @security)
        if: github.event_name == 'push'
        run: npx playwright test --project=ui --grep "@smoke|@regression|@security" --reporter=json,list
        continue-on-error: true
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # nightly → full suite including @visual and @a11y
      - name: Run UI tests (nightly — full suite)
        if: github.event_name == 'schedule'
        run: npx playwright test --project=ui --reporter=json,list
        continue-on-error: true
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: playwright-report/
          retention-days: 30

      - name: Check test results
        run: |
          if [ -f ./playwright-report/report.json ]; then
            FAILED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$FAILED" -gt "0" ]; then
              echo "❌ $FAILED UI test(s) failed"
              exit 1
            fi
            echo "✅ All UI tests passed"
          fi
