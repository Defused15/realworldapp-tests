name: API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *' # Nightly at 2am

jobs:
  api-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci

      # PR → @smoke only (~2 min fast feedback)
      - name: Run API tests (PR — @smoke)
        if: github.event_name == 'pull_request'
        run: npx playwright test --project=api --grep @smoke --reporter=json,list
        continue-on-error: true
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # push to main + nightly → full suite (@smoke + @regression + @security + @contract + @performance)
      - name: Run API tests (push/nightly — full suite)
        if: github.event_name != 'pull_request'
        run: npx playwright test --project=api --reporter=json,list
        continue-on-error: true
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 30

      - name: Check test results
        run: |
          if [ -f ./playwright-report/report.json ]; then
            FAILED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$FAILED" -gt "0" ]; then
              echo "❌ $FAILED API test(s) failed"
              exit 1
            fi
            echo "✅ All API tests passed"
          fi
