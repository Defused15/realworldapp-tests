name: Contract Tests

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *' # Nightly
  workflow_dispatch:

jobs:
  contract-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run contract tests
        run: npx playwright test --grep @contract --project=api --reporter=json,list
        continue-on-error: true
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-report
          path: playwright-report/
          retention-days: 30
      - name: Check contract violations
        run: |
          if [ -f ./playwright-report/report.json ]; then
            FAILED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$FAILED" -gt "0" ]; then
              echo "📋 $FAILED contract test(s) failed — API schema drift detected"
              exit 1
            fi
            echo "✅ API contracts intact"
          fi
