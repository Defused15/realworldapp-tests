name: Nightly

# Heavy suites that are too slow for every PR/push: full UI incl. @visual +
# @a11y, performance stress/spike, and a full ZAP scan. Guarded by vars.APP_IMAGE
# like the main pipeline (skipped until the app image is configured — BACKLOG.md).

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC nightly
  workflow_dispatch: {}

env:
  API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
  BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
  TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME || 'Heath93' }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 's3cret' }}
  APP_IMAGE: '${{ vars.APP_IMAGE }}'

jobs:
  full-suite:
    name: Full suite (incl. @visual + @a11y)
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    # No GitHub `services: postgres` here — setup-app boots the app AND its
    # postgres (rwa_test on host 5433) via app.ci.yml. The DB env below must
    # point at THAT database (same as pipeline.yml's `db` gate), otherwise the
    # db-integration tests query an empty DB and fail with "relation ... does
    # not exist".
    env:
      DB_HOST: localhost
      DB_PORT: '5433'
      DB_NAME: rwa_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      CROSS_BROWSER: '1' # also run Firefox + WebKit UI projects
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-app
      - run: npx playwright install --with-deps firefox webkit
      - run: npm run test:unit
      - run: npm run test:db
      - run: npx playwright test # all projects (incl. cross-browser), all tags

  performance-heavy:
    name: Performance (stress + spike)
    if: ${{ vars.APP_IMAGE != '' }}
    runs-on: ubuntu-latest
    # Non-gating: stress/spike profiles saturate the single-instance demo app on a
    # 2-core runner (connection drops + p95 in seconds). That measures runner
    # capacity, not a regression we control — so it runs for visibility only and
    # never fails the nightly. Real perf SLOs are gated by perf:all:smoke in
    # pipeline.yml (Gate 5). See docs/bug-reports for the observed ceiling.
    continue-on-error: true
    # No postgres service: k6 hits the running app over HTTP; the app's own DB is
    # booted by setup-app. (A bare empty service DB here was unused and misleading.)
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-app
      - uses: grafana/setup-k6-action@v1
      # All load-worthy feature scenarios (home, signin, transaction) at the
      # heavy profiles. signup is a smoke-only tripwire (see thresholds.js), so
      # it is excluded here on purpose.
      - run: PROFILE=stress npm run perf:all
      - run: PROFILE=spike npm run perf:all
