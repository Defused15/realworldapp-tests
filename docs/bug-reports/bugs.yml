# Bug manifest — single source of truth for the GitHub issue sync workflow
# (.github/workflows/bug-report-sync.yml).
#
# Each entry maps a documented app defect to a GitHub issue:
#   - status: open      → workflow ensures an OPEN issue exists (creates if missing)
#   - status: resolved  → workflow CLOSES the matching issue with a comment
#
# Issues are matched idempotently by the `[<id>]` prefix in the issue title and the
# `app-bug` label, so re-runs never create duplicates. The human-readable detail
# lives in the linked `report` markdown file.
#
# These are defects in the application under test (cypress-realworld-app), tracked
# in THIS repo (the QA system of record). We do not patch the app — black-box suite.

